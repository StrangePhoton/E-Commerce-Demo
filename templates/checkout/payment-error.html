{% extends "base.html" %}
{% block title %}Ödeme Hatası{% endblock %}

{% block content %}
<div style="max-width: 640px; margin: 60px auto; padding: 30px; background: #fff; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; font-family: 'Poppins', sans-serif;">
    <div style="width: 70px; height: 70px; border-radius: 50%; background: #fff5f5; color: #e74c3c; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 2rem;">
        <i class="fas fa-times"></i>
    </div>
    <h1 style="color: #2c3e50; margin-bottom: 10px;">Ödeme Başarısız</h1>
    <p style="color: #64748b; line-height: 1.6; margin-bottom: 20px;">
        {{ message|default:"Ödeme işlemi tamamlanamadı. Lütfen tekrar deneyin veya farklı bir kart deneyin." }}
    </p>
    <a href="{% url 'checkout-payment' %}" style="display: inline-flex; align-items: center; gap: 8px; padding: 12px 20px; border-radius: 10px; background: #8e68ab; color: white; text-decoration: none; font-weight: 700;">
        <i class="fas fa-credit-card"></i> Ödeme Sayfasına Dön
    </a>
</div>
{% endblock %}
