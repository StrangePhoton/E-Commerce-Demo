{% extends 'base.html' %}
{% load static %}

{% block title %}Aktivasyon Geçersiz | {{ STORE_NAME }}{% endblock %}

{% block content %}
<div style="min-height: calc(100vh - 200px); display:flex; align-items:center; justify-content:center; padding:40px;">
    <div style="
        background:#fff;
        max-width:520px;
        width:100%;
        padding:40px;
        border-radius:20px;
        box-shadow:0 15px 35px rgba(239,68,68,0.15);
        text-align:center;
        border:1px solid #fee2e2;
    ">
        <div style="
            width:80px;
            height:80px;
            margin:0 auto 20px;
            border-radius:50%;
            background:#ef4444;
            display:flex;
            align-items:center;
            justify-content:center;
            color:white;
            font-size:2.2rem;
        ">
            <i class="fas fa-times"></i>
        </div>

        <h2 style="color:#991b1b; font-weight:700; margin-bottom:15px;">
            Aktivasyon Linki Geçersiz
        </h2>

        <p style="color:#64748b; font-size:0.95rem; line-height:1.6;">
            Aktivasyon bağlantısı süresi dolmuş veya geçersiz.
            <br>
            Lütfen yeniden aktivasyon maili talep edin.
        </p>

        <a href="{% url 'login' %}" class="btn-primary" style="margin-top:25px;">
            Giriş Sayfasına Dön
        </a>
    </div>
</div>
{% endblock %}
