{% extends 'base.html' %}
{% load static %}

{% block title %}Giriş Yap | {{ STORE_NAME }}{% endblock %}

{% block content %}
<style>
    .auth-page-wrapper {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fdfdfd;
        padding: 40px 20px;
    }
    .auth-box {
        background: white;
        padding: 40px;
        border-radius: 25px;
        box-shadow: 0 15px 35px rgba(142, 104, 171, 0.1);
        width: 100%;
        max-width: 450px;
        border-top: 6px solid var(--angeles-lila);
    }
    .auth-box h2 {
        color: var(--angeles-text);
        text-align: center;
        margin-bottom: 30px;
        font-weight: 600;
        font-size: 1.8rem;
    }
    .form-group { margin-bottom: 20px; }
    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
        color: #555;
        font-size: 0.9rem;
    }
    .form-group input:not([type="checkbox"]) {
        width: 100%;
        padding: 12px 15px;
        border: 1.5px solid #eee;
        border-radius: 12px;
        transition: 0.3s;
        outline: none;
    }
    .form-group input:focus {
        border-color: var(--angeles-turkuaz);
        box-shadow: 0 0 0 4px rgba(105, 179, 162, 0.1);
    }
    .password-container { position: relative; }
    .toggle-password {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: #aaa;
        cursor: pointer;
    }
    .btn-auth {
        width: 100%;
        padding: 14px;
        background: var(--angeles-lila);
        color: white;
        border: none;
        border-radius: 12px;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 10px;
    }
    .btn-auth:hover {
        background: var(--angeles-turkuaz);
        transform: translateY(-2px);
    }
    .auth-footer {
        text-align: center;
        margin-top: 25px;
        font-size: 0.9rem;
        color: #777;
    }
    .auth-footer a {
        color: var(--angeles-lila);
        text-decoration: none;
        font-weight: 600;
    }
    .auth-footer a:hover { text-decoration: underline; }
</style>

<div class="auth-page-wrapper">
    <div class="auth-box">
        <h2>Hoş Geldiniz</h2>
        <form method="POST" class="auth-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">E-posta Adresi</label>
                <input type="text" name="username" id="username" placeholder="ornek@mail.com" required>
            </div>
            <div class="form-group">
                <label for="password">Şifre</label>
                <div class="password-container">
                    <input type="password" name="password" id="password" placeholder="Şifreniz" required>
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility('password', this)">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn-auth">Giriş Yap</button>
            <div class="auth-footer">
                <a href="{% url 'password_reset' %}">Şifremi Unuttum</a>
                <p style="margin-top: 15px;">Üye değil misiniz? <a href="{% url 'signup' %}">Hemen Üye Ol</a></p>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function togglePasswordVisibility(inputId, btn) {
    const input = document.getElementById(inputId);
    const icon = btn.querySelector('i');
    if (input.type === "password") {
        input.type = "text";
        icon.className = 'fas fa-eye-slash';
    } else {
        input.type = "password";
        icon.className = 'fas fa-eye';
    }
}
</script>
{% endblock %}
