{# templates/components/price-popup.html #}
<style>
    /* Overlay Correction */
    .popup-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(45, 40, 50, 0.7); /* A dark purple-gray transparent */
        backdrop-filter: blur(5px); /* Blur the background to focus */
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 2000;
        padding: 20px;
    }

    /* Card Design */
    .popup-content {
        background: white;
        padding: 40px;
        border-radius: 25px;
        max-width: 500px;
        width: 100%;
        text-align: center;
        box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        position: relative;
        border-top: 8px solid var(--angeles-lila);
        animation: popupScale 0.3s ease-out;
    }

    @keyframes popupScale {
        from { transform: scale(0.9); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
    }

    .popup-content h3 {
        color: var(--angeles-lila);
        font-size: 1.6rem;
        margin-bottom: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
    }

    .popup-content h3::before {
        content: "\f05a"; /* FontAwesome Info Icon */
        font-family: "Font Awesome 5 Free";
        font-weight: 900;
        font-size: 2.5rem;
        color: var(--angeles-turkuaz);
        margin-bottom: 10px;
    }

    .popup-content p {
        color: #666;
        line-height: 1.6;
        font-size: 1rem;
        margin-bottom: 30px;
    }

    /* Button Group */
    .popup-buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
    }

    .popup-btn {
        padding: 12px 20px;
        border-radius: 15px;
        text-decoration: none;
        font-weight: 600;
        font-size: 0.95rem;
        transition: 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        border: none;
        cursor: pointer;
    }

    .btn-login {
        background: var(--angeles-lila);
        color: white;
    }

    .btn-login:hover {
        background: #7a5a92; /* A darker purple */
        transform: translateY(-2px);
    }

    .btn-signup {
        background: var(--angeles-turkuaz);
        color: white;
    }

    .btn-signup:hover {
        background: var(--angeles-yesil);
        transform: translateY(-2px);
    }

    .close-btn {
        grid-column: 1 / -1; /* Span two columns */
        background: #f0f0f0;
        color: #888;
        margin-top: 5px;
    }

    .close-btn:hover {
        background: #e5e5e5;
        color: #555;
    }

    /* Close Cross (Optional) */
    .popup-close-x {
        position: absolute;
        top: 20px;
        right: 20px;
        font-size: 1.5rem;
        color: #ccc;
        cursor: pointer;
        line-height: 1;
    }
</style>

<div id="pricePopup" class="popup-overlay">
  <div class="popup-content">
    <span class="popup-close-x" onclick="closePricePopup()">&times;</span>
    <h3>Fiyat Bilgisi</h3>
    <p>
      Tıbbi Cihaz Satış, Reklam ve Tanıtım Yönetmeliği gereğince, tıbbi cihazların fiyat bilgisi sadece üyelerimize gösterilebilmektedir.
      <br><br>
      Fiyatları incelemek ve sipariş vermek için lütfen oturum açın.
    </p>
    <div class="popup-buttons">
      <a href="{% url 'login' %}" class="popup-btn btn-login">Giriş Yap</a>
      <a href="{% url 'signup' %}" class="popup-btn btn-signup">Üye Ol</a>
      <button onclick="closePricePopup()" class="popup-btn close-btn">Vazgeç</button>
    </div>
  </div>
</div>

<script>
  if (typeof showPricePopup === 'undefined') {
    function showPricePopup() {
      const popup = document.getElementById("pricePopup");
      if (popup) {
        popup.style.display = "flex";
        document.body.style.overflow = "hidden";
      }
    }
  }

  if (typeof closePricePopup === 'undefined') {
    function closePricePopup() {
      const popup = document.getElementById("pricePopup");
      if (popup) {
        popup.style.display = "none";
        document.body.style.overflow = "auto";
      }
    }
  }

  document.addEventListener('DOMContentLoaded', function() {
    const popup = document.getElementById("pricePopup");
    if (popup) {
      popup.addEventListener('click', function(e) {
        if (e.target === popup) {
          closePricePopup();
        }
      });
    }
  });
</script>
